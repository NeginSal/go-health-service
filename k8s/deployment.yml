apiVersion: apps/v1
kind: Deployment

metadata:
  name: go-health

spec:
  replicas: 1

  selector:
    matchLabels:
      app: go-health

  template:
    metadata:
      labels:
        app: go-health

    spec:
      containers:
      - name: go-health
        image: go-health-service:v4
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 8080