services:
  app:
    build: .
    container_name: go-health-service

    ports:
      - "8080:8080"

    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest

    container_name: prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

    restart: unless-stopped